<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notebook Studio</title>
    <style>
        :root { --bg-color: #f4f4f9; --panel-bg: #ffffff; --border: 1px solid #ddd; }
        body { font-family: system-ui, -apple-system, sans-serif; margin: 0; background-color: var(--bg-color); display: flex; height: 100vh; color: #333; }
        .panel { background: var(--panel-bg); border-right: var(--border); padding: 20px; overflow-y: auto; }
        .sidebar { flex: 1; min-width: 250px; }
        .studio { flex: 2; border-right: var(--border); min-width: 400px; }
        .live-queue { flex: 1; border-right: none; min-width: 250px; }
        h2 { font-size: 1.2rem; margin-top: 0; padding-bottom: 10px; border-bottom: 2px solid #eee; }
        h3 { font-size: 1rem; color: #555; }
        .section { margin-bottom: 20px; padding: 15px; border: var(--border); border-radius: 8px; background: #fafafa; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9rem; }
        input[type="text"], input[type="file"], select, textarea { width: 100%; margin-bottom: 15px; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { padding: 12px 15px; background: #0056b3; color: white; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold; font-size: 1rem; transition: background 0.2s; }
        button:hover { background: #004494; }
        button.active { background: #28a745; }
        button.active:hover { background: #218838; }
        .caller-list { list-style: none; padding: 0; margin: 0; }
        .caller-list li { padding: 10px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
    </style>
</head>
<body>
    <aside class="panel sidebar">
        <h2>📚 Knowledge Base</h2>
        <div class="section">
            <label for="source-upload">Upload Sources</label>
            <input type="file" id="source-upload" multiple>
        </div>
        <div class="section">
            <label for="instructions">Linked Instructions</label>
            <textarea id="instructions" rows="6" placeholder="Enter instructions..."></textarea>
            <label style="font-weight: normal; font-size: 0.85rem; display: flex; align-items: center; gap: 8px;">
                <input type="checkbox" id="verify-online" style="width: auto; margin: 0;"> Verify online for latest version
            </label>
        </div>
    </aside>
    <main class="panel studio">
        <h2>🎙️ Recording Studio</h2>
        <div class="section" id="hosts-container">
            <h3>Primary Host</h3>
            <label for="host-voice">Select Host Voice</label>
            <select id="host-voice"></select>
            <label for="host-persona">Host Persona</label>
            <textarea id="host-persona" rows="3" placeholder="Define the host's personality..."></textarea>
        </div>
        <div class="section" id="guests-container">
            <h3>Guests</h3>
            <label for="guest1-voice">Guest 1 Voice</label>
            <select id="guest1-voice"></select>
            <label for="guest1-persona">Guest 1 Persona</label>
            <textarea id="guest1-persona" rows="2" placeholder="Guest 1 background..."></textarea>
            <label for="guest2-voice">Guest 2 Voice</label>
            <select id="guest2-voice"></select>
            <label for="guest2-persona">Guest 2 Persona</label>
            <textarea id="guest2-persona" rows="2" placeholder="Guest 2 background..."></textarea>
        </div>
        <button id="start-session">Start Session</button>
    </main>
    <aside class="panel live-queue">
        <h2>📞 Live Connect</h2>
        <div class="section">
            <p>Linked Number: <strong style="font-size: 1.2rem; color: #0056b3;">555-0199</strong></p>
            <button id="toggle-lines">Open Phone Lines</button>
        </div>
        <div class="section">
            <label>Caller Queue</label>
            <ul class="caller-list" id="caller-list">
                <li><em>No callers currently waiting.</em></li>
            </ul>
        </div>
    </aside>
    <script>
        const availableVoices = [
            { id: "v_alex", name: "Alex", tone: "Professional & Clear" },
            { id: "v_sam", name: "Sam", tone: "Energetic & Upbeat" },
            { id: "v_taylor", name: "Taylor", tone: "Calm & Relaxed" },
            { id: "v_jordan", name: "Jordan", tone: "Authoritative & Serious" },
            { id: "v_casey", name: "Casey", tone: "Warm & Empathetic" }
        ];
        const hostSelect = document.getElementById('host-voice');
        const guest1Select = document.getElementById('guest1-voice');
        const guest2Select = document.getElementById('guest2-voice');
        
        availableVoices.forEach(voice => {
            const optionHTML = <option value=""> - </option>;
            hostSelect.insertAdjacentHTML('beforeend', optionHTML);
            guest1Select.insertAdjacentHTML('beforeend', optionHTML);
            guest2Select.insertAdjacentHTML('beforeend', optionHTML);
        });

        guest1Select.insertAdjacentHTML('afterbegin', '<option value="none">-- No Guest --</option>');
        guest2Select.insertAdjacentHTML('afterbegin', '<option value="none">-- No Guest --</option>');
        guest1Select.value = 'none';
        guest2Select.value = 'none';

        document.getElementById('start-session').addEventListener('click', () => {
            const sessionData = {
                instructions: document.getElementById('instructions').value,
                verifyOnline: document.getElementById('verify-online').checked,
                host: { voice: document.getElementById('host-voice').value, persona: document.getElementById('host-persona').value },
                guest1: { voice: document.getElementById('guest1-voice').value, persona: document.getElementById('guest1-persona').value },
                guest2: { voice: document.getElementById('guest2-voice').value, persona: document.getElementById('guest2-persona').value }
            };
            localStorage.setItem('studioSession', JSON.stringify(sessionData));
            alert('Session settings saved!');
        });

        const toggleLinesBtn = document.getElementById('toggle-lines');
        let linesOpen = false;
        toggleLinesBtn.addEventListener('click', () => {
            linesOpen = !linesOpen;
            if (linesOpen) {
                toggleLinesBtn.textContent = "Close Phone Lines";
                toggleLinesBtn.classList.add("active");
                document.getElementById('caller-list').innerHTML = "<li><em>Listening for incoming calls...</em></li>";
            } else {
                toggleLinesBtn.textContent = "Open Phone Lines";
                toggleLinesBtn.classList.remove("active");
                document.getElementById('caller-list').innerHTML = "<li><em>No callers currently waiting.</em></li>";
            }
        });
    </script>
</body>
</html>
